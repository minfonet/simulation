services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: simulation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=simulation;Username=postgres;Password=postgres"
      Jwt__Key: "ThisIsASecureKeyForDevelopmentPurposesOnlyChangeInProduction"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../src/frontend/sim-web
      dockerfile: ../../../docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - backend

volumes:
  pgdata:
